kind = "web"
previewPath = "/"
title = "FlowGuard Winnipeg Plumbing"
version = "1.0.0"
id = "artifacts/flowguard-plumbing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22425

[services.development]
run = "pnpm --filter @workspace/flowguard-plumbing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flowguard-plumbing", "run", "build" ]
publicDir = "artifacts/flowguard-plumbing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22425"
BASE_PATH = "/"
